<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本史クイズ 〜いにしえの偉人〜 | HISTORY QUIZ</title>
<meta name="description" content="旧石器時代から江戸時代までの有名な人物を4択で出題。簡単から激ムズまで、全24問の日本史クイズ。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%8F%AF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --washi: #f3ece0;
  --washi-2: #ece2d2;
  --sumi: #2a2620;
  --sumi-soft: #514a3f;
  --gold: #b6892f;
  --gold-light: #d8b25a;
  --vermilion: #c0392b;
  --indigo: #2c5069;
  --green: #4a7c59;
  --line: #ddd0bb;
  --card: #fffdf8;
  --shadow: 0 10px 30px rgba(60,45,25,.14);
  --easy: #4a7c59;
  --normal: #2c5069;
  --hard: #b6892f;
  --extreme: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: "Zen Kaku Gothic New", sans-serif;
  color: var(--sumi);
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(182,137,47,.10), transparent 60%),
    linear-gradient(175deg, var(--washi) 0%, var(--washi-2) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  line-height: 1.9;
  padding: 18px 16px 50px;
  /* 和紙のかすれ */
  position: relative;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; opacity: .5; z-index: 0;
  background-image: radial-gradient(rgba(120,95,55,.05) 1px, transparent 1px);
  background-size: 22px 22px;
}
a { color: inherit; text-decoration: none; }
.wrap { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }
.serif { font-family: "Shippori Mincho B1", serif; }

/* ---------- ヘッダー ---------- */
.back { display: inline-block; font-size: .78rem; font-weight: 700; color: var(--sumi-soft);
  background: rgba(255,255,255,.7); border-radius: 999px; padding: 6px 16px; margin-bottom: 14px; }
.back:hover { background: #fff; }
header.top { text-align: center; margin-bottom: 22px; }
header.top .en { font-size: .68rem; letter-spacing: .4em; color: var(--gold); font-weight: 700; }
header.top h1 { font-family: "Shippori Mincho B1", serif; font-weight: 800;
  font-size: clamp(1.7rem, 6vw, 2.5rem); letter-spacing: .08em; margin-top: 6px;
  color: var(--sumi); }
header.top h1 .brush { color: var(--vermilion); }
header.top .sub { font-size: .82rem; color: var(--sumi-soft); margin-top: 6px; font-weight: 500; }

/* ---------- カード共通 ---------- */
.panel { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
  box-shadow: var(--shadow); padding: clamp(22px, 5vw, 34px); }

/* ---------- スタート画面 ---------- */
.start .seal { width: 90px; height: 90px; margin: 0 auto 12px; display: block; }
.start h2 { font-family: "Shippori Mincho B1", serif; text-align: center; font-size: 1.3rem; letter-spacing: .06em; }
.start p.lead { text-align: center; color: var(--sumi-soft); font-size: .9rem; margin-top: 10px; }
.diff-legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0 6px; }
.diff-badge { font-size: .74rem; font-weight: 700; padding: 4px 14px; border-radius: 999px; color: #fff; }
.b-easy { background: var(--easy); } .b-normal { background: var(--normal); }
.b-hard { background: var(--hard); } .b-extreme { background: var(--extreme); }
.start-info { text-align: center; color: var(--sumi-soft); font-size: .82rem; margin-top: 14px; }
.start-info b { color: var(--vermilion); font-size: 1.1rem; }

.btn { font-family: inherit; font-weight: 700; border: none; cursor: pointer; border-radius: 999px;
  transition: transform .15s, box-shadow .15s, background .2s; }
.btn:active { transform: translateY(2px); }
.btn-main { display: block; width: 100%; max-width: 320px; margin: 22px auto 0;
  padding: 16px; font-size: 1.05rem; background: var(--vermilion); color: #fff;
  box-shadow: 0 6px 0 #93261a; letter-spacing: .08em; }
.btn-main:active { box-shadow: 0 2px 0 #93261a; }

/* ---------- クイズ画面 ---------- */
.quiz-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.qcount { font-family: "Shippori Mincho B1", serif; font-size: .92rem; color: var(--sumi-soft); }
.qcount b { font-size: 1.3rem; color: var(--sumi); }
.qscore { font-size: .82rem; color: var(--sumi-soft); font-weight: 700; }
.qscore b { color: var(--vermilion); font-size: 1.1rem; }
.progress { height: 8px; background: var(--washi-2); border-radius: 999px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--line); }
.progress span { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); width: 0; transition: width .4s ease; }

.q-badges { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.era-badge { font-size: .72rem; font-weight: 700; padding: 3px 12px; border-radius: 6px;
  background: var(--washi-2); color: var(--sumi-soft); border: 1px solid var(--line); }
.question { font-family: "Shippori Mincho B1", serif; font-size: clamp(1.05rem, 3.6vw, 1.3rem);
  font-weight: 700; line-height: 1.7; margin-bottom: 20px; }

.choices { display: grid; gap: 12px; }
.choice { text-align: left; padding: 15px 18px; font-size: .95rem; font-weight: 500;
  background: #fff; border: 2px solid var(--line); border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 12px; transition: border-color .18s, background .18s, transform .1s; }
.choice:hover:not(:disabled) { border-color: var(--gold); transform: translateX(2px); }
.choice .mark { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  background: var(--washi-2); color: var(--sumi-soft); font-weight: 700; font-size: .82rem;
  display: grid; place-items: center; font-family: "Shippori Mincho B1", serif; }
.choice.correct { border-color: var(--green); background: #eef6ef; }
.choice.correct .mark { background: var(--green); color: #fff; }
.choice.wrong { border-color: var(--vermilion); background: #fbeeec; }
.choice.wrong .mark { background: var(--vermilion); color: #fff; }
.choice:disabled { cursor: default; }

.explain { margin-top: 18px; padding: 16px 18px; border-radius: 12px; background: var(--washi);
  border: 1px dashed var(--line); font-size: .86rem; color: var(--sumi-soft); display: none; }
.explain.show { display: block; animation: fade .3s ease; }
@keyframes fade { from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:none;} }
.explain .verdict { font-family: "Shippori Mincho B1", serif; font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
.explain .verdict.ok { color: var(--green); } .explain .verdict.ng { color: var(--vermilion); }
.next-btn { display: block; width: 100%; max-width: 260px; margin: 16px auto 0; padding: 13px;
  background: var(--sumi); color: var(--washi); font-size: .95rem; box-shadow: 0 5px 0 #171410; }
.next-btn:active { box-shadow: 0 2px 0 #171410; }

/* ---------- 結果画面 ---------- */
.result { text-align: center; }
.result .rank { font-family: "Shippori Mincho B1", serif; font-size: 2.4rem; font-weight: 800; color: var(--vermilion); }
.result .rank-title { font-family: "Shippori Mincho B1", serif; font-size: 1.2rem; margin-top: 4px; }
.result .score-big { font-size: 1rem; color: var(--sumi-soft); margin-top: 12px; }
.result .score-big b { font-size: 2.6rem; font-family: "Shippori Mincho B1", serif; color: var(--sumi); }
.result .comment { font-size: .88rem; color: var(--sumi-soft); margin: 12px 0 6px; }
.breakdown { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 18px 0; }
.bd { font-size: .76rem; font-weight: 700; padding: 6px 14px; border-radius: 10px; background: var(--washi); border: 1px solid var(--line); }

footer { text-align: center; font-size: .72rem; color: var(--sumi-soft); margin-top: 26px; font-weight: 500; }

@media (max-width: 380px) {
  .choice { padding: 13px 14px; font-size: .9rem; gap: 10px; }
}
</style>
</head>

<div class="wrap">

  <header class="top">
    <p class="en">JAPANESE HISTORY QUIZ</p>

  <section class="panel start" id="startScreen">

    <div class="diff-legend">
      <span class="diff-badge b-easy">簡単</span>

  <!-- クイズ -->
  <section class="panel" id="quizScreen" style="display:none">

    <div class="progress"><span id="progressBar"></span></div>
    <div class="q-badges">
      <span class="diff-badge" id="qDiff">簡単</span>
      <span class="era-badge" id="qEra">時代</span>
    </div>
    <p class="question serif" id="qText">問題文</p>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain">
      <p class="verdict" id="verdict"></p>
      <p id="explainText"></p>
      <button class="btn next-btn" id="nextBtn">つぎの問題へ →</button>
    </div>
  </section>

  <!-- 結果 -->
  <section class="panel result" id="resultScreen" style="display:none">
    <p class="rank" id="rankLabel">◯◯</p>
    <p class="rank-title serif" id="rankTitle"></p>
    <p class="score-big"><b id="finalScore">0</b> / 24 問 正解</p>
    <p class="comment" id="resultComment"></p>
    <div class="breakdown" id="breakdown"></div>
    <button class="btn btn-main" id="retryBtn">もう一度挑戦する</button>
  </section>

  <footer>© 2026 日本史クイズ 🏯 このアプリはデモ用のオリジナル作品です。</footer>
</div>

<script>

      choices:["運慶","雪舟","定朝","世阿弥"], answer:0,
      exp:"力強く写実的な作風で鎌倉彫刻を代表します。父は康慶、快慶は同門の仏師です。" },
    { d:4, era:"江戸時代", q:"株仲間を奨励するなど商業重視の政治を行い、賄賂政治とも批判された江戸中期の老中は誰？",
      choices:["田沼意次","松平定信","水野忠邦","新井白石"], answer:0,
      exp:"重商主義的な政策で幕府財政の立て直しをはかりましたが、天明の飢饉などもあり失脚しました。" },
    { d:4, era:"旧石器時代", q:"1946年、群馬県岩宿で関東ローム層から石器を発見し、日本の旧石器時代の存在を証明した人物は誰？",
      choices:["相沢忠洋","モース","ナウマン","杉原荘介"], answer:0,
      exp:"在野の考古学研究者。岩宿遺跡の発見により、縄文時代より前の旧石器文化の存在が明らかになりました。" },
  ];

  const el = (id) => document.getElementById(id);
  let idx = 0, score = 0, locked = false;
  let byDiff = { 1:{c:0,t:0}, 2:{c:0,t:0}, 3:{c:0,t:0}, 4:{c:0,t:0} };

  function show(screen) {
    ["startScreen","quizScreen","resultScreen"].forEach(s => el(s).style.display = "none");
    el(screen).style.display = "block";
  }

  function start() {
    idx = 0; score = 0; locked = false;
    byDiff = { 1:{c:0,t:0}, 2:{c:0,t:0}, 3:{c:0,t:0}, 4:{c:0,t:0} };
    show("quizScreen");
    renderQuestion();
  }

  function renderQuestion() {
    locked = false;
    const item = QUESTIONS[idx];
    el("qNow").textContent = idx + 1;
    el("qScore").textContent = score;
    el("progressBar").style.width = (idx / QUESTIONS.length * 100) + "%";
    const d = DIFF[item.d];
    const diffEl = el("qDiff");
    diffEl.textContent = d.label;
    diffEl.className = "diff-badge " + d.cls;
    el("qEra").textContent = item.era;
    el("qText").textContent = item.q;
    const marks = ["一","二","三","四"];
    const box = el("choices");
    box.innerHTML = "";
    item.choices.forEach((c, i) => {
      const b = document.createElement("button");
      b.className = "choice";
      b.innerHTML = '<span class="mark">' + marks[i] + '</span><span>' + c + '</span>';
      b.addEventListener("click", () => answer(i));
      box.appendChild(b);
    });
    el("explain").classList.remove("show");
  }

  function answer(choice) {
    if (locked) return;
    locked = true;
    const item = QUESTIONS[idx];
    const correct = choice === item.answer;
    const buttons = el("choices").querySelectorAll(".choice");
    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === item.answer) b.classList.add("correct");
      else if (i === choice) b.classList.add("wrong");
    });
    byDiff[item.d].t++;
    if (correct) { score++; byDiff[item.d].c++; el("qScore").textContent = score; }
    const v = el("verdict");
    v.textContent = correct ? "正解！" : ("残念…正解は「" + item.choices[item.answer] + "」");
    v.className = "verdict " + (correct ? "ok" : "ng");
    el("explainText").textContent = item.exp;
    el("nextBtn").textContent = (idx === QUESTIONS.length - 1) ? "結果を見る →" : "つぎの問題へ →";
    el("explain").classList.add("show");
    el("explain").scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function next() {
    idx++;
    if (idx < QUESTIONS.length) renderQuestion();
    else showResult();
  }

  function showResult() {
    el("progressBar").style.width = "100%";
    const total = QUESTIONS.length;
    const rate = score / total;
    let rank, title, comment;
    if (rate === 1)        { rank="天下人"; title="パーフェクト！"; comment="全問正解！あなたはまさに歴史の達人です。"; }
    else if (rate >= 0.83) { rank="大名級"; title="お見事！";       comment="かなりの歴史通。細かい人物までよく知っていますね。"; }
    else if (rate >= 0.66) { rank="武将級"; title="なかなか！";     comment="基礎はばっちり。あと一歩で歴史マスターです。"; }
    else if (rate >= 0.45) { rank="足軽級"; title="その調子！";     comment="有名どころは押さえています。難問に再挑戦しよう。"; }
    else                   { rank="見習い"; title="これから！";     comment="ここからが伸びしろ。解説を読んでまた挑戦してみて。"; }
    el("rankLabel").textContent = rank;
    el("rankTitle").textContent = title;
    el("finalScore").textContent = score;
    el("resultComment").textContent = comment;
    const bd = el("breakdown");
    bd.innerHTML = "";
    [1,2,3,4].forEach(d => {
      const o = byDiff[d];
      const s = document.createElement("span");
      s.className = "bd";
      s.textContent = DIFF[d].label + " " + o.c + "/" + o.t;
      bd.appendChild(s);
    });
    show("resultScreen");
  }

  el("startBtn").addEventListener("click", start);
  el("retryBtn").addEventListener("click", start);
  el("nextBtn").addEventListener("click", next);
})();
</script>
</body>
</html>
