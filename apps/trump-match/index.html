<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スートマッチ★トランプパズル - 無料パズルゲーム</title>
<meta name="description" content="ダイヤ・ハート・スペード・クローバーを縦か横に4つ揃えて消す無料パズルゲーム。スワイプでカードを入れ替え、連鎖でコンボ。手数制限のうちにステージ毎の目標を達成しよう。スマホ・タブレット対応。">
<style>
  :root {
    --bg: #04331f;
    --panel: #0a3d24;
    --panel-2: #0e4a2c;
    --cell: #12572f;
    --gold: #e8c15a;
    --gold-dim: #b6924a;
    --text: #f6f1e2;
    --sub: #a9c9b6;
    --danger: #ff6b6b;
    --diamond: #ef4757;
    --heart: #ff6fa5;
    --spade: #24263a;
    --club: #2fa661;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(ellipse at 50% -10%, #0e5b34 0%, var(--bg) 55%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.015) 0 2px, transparent 2px 6px);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic UI", "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    padding: clamp(10px, 2.4vw, 22px) 10px 26px;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap { width: min(94vw, 66dvh, 520px); display: flex; flex-direction: column; gap: clamp(8px, 1.6vw, 12px); }

  header { text-align: center; }
  h1 {
    font-size: clamp(1.4rem, 6.4vw, 2.1rem);
    font-weight: 800;
    letter-spacing: .03em;
    background: linear-gradient(90deg, var(--gold), #fff3d0, var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(232,193,90,.3));
  }
  h1 small { display: block; font-size: clamp(.58rem, 2.2vw, .74rem); color: var(--sub); -webkit-text-fill-color: var(--sub); font-weight: 600; letter-spacing: .22em; margin-top: 2px; }

  .status-row { display: flex; gap: 8px; }
  .status-box {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    border-radius: 12px;
    padding: clamp(6px, 1.8vw, 10px) 4px;
    text-align: center;
  }
  .status-box .label { font-size: clamp(.55rem, 2vw, .68rem); color: var(--sub); letter-spacing: .1em; }
  .status-box .value { font-size: clamp(1.15rem, 5vw, 1.6rem); font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; }
  .status-box.moves.low .value { color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.45; } }
  .status-box .sub { font-size: clamp(.5rem, 1.8vw, .62rem); color: var(--sub); margin-top: 1px; }

  .goals {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    border-radius: 12px;
    padding: 8px;
  }
  .goal-pill {
    flex: 1 1 42%;
    min-width: 120px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,.18);
    border: 1px solid rgba(232,193,90,.25);
    border-radius: 9px;
    padding: 5px 8px;
  }
  .goal-pill .icon { font-size: clamp(1.1rem, 4vw, 1.4rem); width: 1.2em; text-align: center; flex-shrink: 0; }
  .goal-pill .info { flex: 1; min-width: 0; }
  .goal-pill .count { font-size: clamp(.68rem, 2.6vw, .82rem); font-weight: 700; font-variant-numeric: tabular-nums; }
  .goal-pill .bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,.12); margin-top: 3px; overflow: hidden; }
  .goal-pill .bar-fill { height: 100%; width: 0%; border-radius: 3px; transition: width .3s ease; }
  .goal-pill.done { border-color: var(--gold); box-shadow: 0 0 10px rgba(232,193,90,.35); }
  .goal-pill.done .count::after { content: " ✓"; color: var(--gold); }

  .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .toolbar p { font-size: clamp(.62rem, 2.4vw, .76rem); color: var(--sub); line-height: 1.5; }
  button {
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(.7rem, 2.8vw, .86rem);
    color: #1a1002;
    background: linear-gradient(135deg, var(--gold), #f7d97e);
    border: none;
    border-radius: 10px;
    padding: clamp(7px, 2vw, 11px) clamp(12px, 3.6vw, 18px);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(232,193,90,.3);
    transition: transform .12s, box-shadow .12s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  button:active { transform: scale(.94); }

  .board-outer { position: relative; }
  .board {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: linear-gradient(160deg, var(--panel-2), var(--panel));
    border: 2px solid var(--gold-dim);
    border-radius: 16px;
    padding: var(--gap);
    box-shadow: 0 10px 40px rgba(0,0,0,.5), inset 0 0 40px rgba(0,0,0,.25);
    --gap: clamp(4px, 1.4vw, 8px);
    touch-action: none;
  }
  .grid { position: absolute; inset: var(--gap); display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); gap: var(--gap); pointer-events: none; }
  .cell-bg { background: var(--cell); border-radius: 6px; border: 1px solid rgba(232,193,90,.08); }
  .tiles { position: absolute; inset: var(--gap); }
  .tile {
    position: absolute;
    width: calc((100% - 7 * var(--gap)) / 8);
    height: calc((100% - 7 * var(--gap)) / 8);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fffaf0, #eee3c9);
    border: 1px solid rgba(0,0,0,.18);
    box-shadow: 0 2px 5px rgba(0,0,0,.3);
    transition: transform .17s ease, scale .15s ease, box-shadow .15s ease;
    will-change: transform;
  }
  .tile .sym { font-size: clamp(1rem, 4.6vw, 1.7rem); line-height: 1; pointer-events: none; }
  .tile::before, .tile::after {
    content: attr(data-sym);
    position: absolute;
    font-size: 26%;
    opacity: .55;
    pointer-events: none;
  }
  .tile::before { top: 6%; left: 10%; }
  .tile::after  { bottom: 6%; right: 10%; transform: rotate(180deg); }
  .tile.suit-diamond .sym, .tile.suit-diamond::before, .tile.suit-diamond::after { color: var(--diamond); }
  .tile.suit-heart   .sym, .tile.suit-heart::before,   .tile.suit-heart::after   { color: var(--heart); }
  .tile.suit-spade   .sym, .tile.suit-spade::before,   .tile.suit-spade::after   { color: var(--spade); }
  .tile.suit-club    .sym, .tile.suit-club::before,    .tile.suit-club::after    { color: var(--club); }
  .tile.pop { animation: pop .2s ease-out; }
  .tile.grabbed { scale: 1.1; box-shadow: 0 0 0 3px var(--gold), 0 4px 14px rgba(0,0,0,.4); z-index: 4; }
  .tile.clearing { animation: tileClear .24s ease forwards; pointer-events: none; }
  @keyframes pop { 0% { scale: 0; } 70% { scale: 1.12; } 100% { scale: 1; } }
  @keyframes tileClear { 0% { scale: 1; opacity: 1; } 55% { scale: 1.22; opacity: 1; } 100% { scale: 0; opacity: 0; } }

  .toast {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,15,5,.85);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-weight: 800;
    font-size: clamp(.8rem, 3.4vw, 1.1rem);
    padding: 6px 18px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 6;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(4,12,8,.9);
    backdrop-filter: blur(4px);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 5;
    text-align: center;
    padding: 20px;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay h2 { font-size: clamp(1.3rem, 6vw, 2rem); }
  .overlay h2.win { color: var(--gold); text-shadow: 0 0 20px rgba(232,193,90,.6); }
  .overlay h2.lose { color: var(--danger); text-shadow: 0 0 20px rgba(255,107,107,.5); }
  .overlay p { color: var(--sub); font-size: clamp(.75rem, 3vw, .92rem); line-height: 1.6; }

  footer { text-align: center; color: var(--sub); font-size: clamp(.58rem, 2vw, .7rem); letter-spacing: .04em; }

  @media (min-width: 768px) and (max-width: 1180px) {
    .wrap { width: min(72vw, 62dvh, 560px); }
  }
  @media (orientation: landscape) and (max-height: 560px) {
    .wrap { width: min(48dvh, 380px); gap: 6px; }
    footer { display: none; }
    .toolbar p { display: none; }
  }
</style>
</head>
<body>
<a href="../../index.html" data-topbtn style="position:fixed;left:14px;bottom:14px;z-index:99999;display:inline-flex;align-items:center;gap:5px;background:rgba(25,25,25,.82);color:#fff;font-family:system-ui,sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;padding:9px 16px;border-radius:999px;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.35);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);">↑ TOPページへ</a>
<div class="wrap">
  <header>
    <h1>スートマッチ<small>♦ ♥ ♠ ♣ TRUMP PUZZLE</small></h1>
  </header>

  <div class="status-row">
    <div class="status-box">
      <div class="label">STAGE</div>
      <div class="value" id="stageVal">1 / 6</div>
      <div class="sub" id="bestVal">記録: -</div>
    </div>
    <div class="status-box moves" id="movesBox">
      <div class="label">のこり手数</div>
      <div class="value" id="movesVal">0</div>
      <div class="sub">スワイプで入れ替え</div>
    </div>
  </div>

  <div class="goals" id="goals"></div>

  <div class="toolbar">
    <p>カードをスワイプして隣と入れ替え、同じ絵柄を縦か横に<b>4つ以上</b>そろえて消そう。消えると連鎖するかも!</p>
    <button id="newGame">最初から</button>
  </div>

  <div class="board-outer">
    <div class="board" id="board">
      <div class="grid" id="grid"></div>
      <div class="tiles" id="tiles"></div>
      <div class="toast" id="toast"></div>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle"></h2>
        <p id="overlayText"></p>
        <button id="overlayBtn">もういちど</button>
      </div>
    </div>
  </div>

  <footer>スートマッチ — ステージが進むほど目標がふえて手数もきびしくなります</footer>
</div>

<script>
(() => {
  const ROWS = 8, COLS = 8;
  const SUITS = {
    diamond: { symbol: "♦︎", label: "ダイヤ",     color: "var(--diamond)" },
    heart:   { symbol: "♥︎", label: "ハート",     color: "var(--heart)" },
    spade:   { symbol: "♠︎", label: "スペード",   color: "var(--spade)" },
    club:    { symbol: "♣︎", label: "クローバー", color: "var(--club)" },
  };
  const SUIT_KEYS = Object.keys(SUITS);

  const STAGES = [
    { moves: 12, goals: { heart: 15 } },
    { moves: 14, goals: { club: 10, diamond: 12 } },
    { moves: 16, goals: { spade: 10, heart: 15, diamond: 10 } },
    { moves: 18, goals: { club: 15, diamond: 15, spade: 15, heart: 15 } },
    { moves: 14, goals: { heart: 25, spade: 20 } },
    { moves: 20, goals: { diamond: 20, heart: 20, spade: 20, club: 20 } },
  ];

  const $ = id => document.getElementById(id);
  const gridEl = $("grid"), tilesEl = $("tiles"), boardEl = $("board");
  const goalsEl = $("goals"), toastEl = $("toast");
  const stageVal = $("stageVal"), movesVal = $("movesVal"), movesBox = $("movesBox"), bestVal = $("bestVal");
  const overlay = $("overlay"), overlayTitle = $("overlayTitle"), overlayText = $("overlayText"), overlayBtn = $("overlayBtn");

  for (let i = 0; i < ROWS * COLS; i++) {
    const c = document.createElement("div");
    c.className = "cell-bg";
    gridEl.appendChild(c);
  }

  const wait = ms => new Promise(res => setTimeout(res, ms));
  const randomSuit = () => SUIT_KEYS[Math.random() * SUIT_KEYS.length | 0];

  let board, nextId, stageIndex, movesLeft, goalProgress, currentGoals, busy, gameEnded;
  let best = +(localStorage.getItem("trumpmatch-best-stage") || 0);
  bestVal.textContent = best > 0 ? `記録: ステージ${best}まで到達` : "記録: -";

  /* ---------- 盤面ロジック ---------- */
  function findMatchesInBoard(b) {
    const matched = new Set();
    for (let r = 0; r < ROWS; r++) {
      let runStart = 0;
      for (let c = 1; c <= COLS; c++) {
        const cur = c < COLS ? b[r][c] : null;
        const base = b[r][runStart];
        const same = cur && base && cur.suit === base.suit;
        if (!same) {
          if (c - runStart >= 4) for (let k = runStart; k < c; k++) matched.add(r + "," + k);
          runStart = c;
        }
      }
    }
    for (let c = 0; c < COLS; c++) {
      let runStart = 0;
      for (let r = 1; r <= ROWS; r++) {
        const cur = r < ROWS ? b[r][c] : null;
        const base = b[runStart][c];
        const same = cur && base && cur.suit === base.suit;
        if (!same) {
          if (r - runStart >= 4) for (let k = runStart; k < r; k++) matched.add(k + "," + c);
          runStart = r;
        }
      }
    }
    return matched;
  }

  function wouldMatch(b, r1, c1, r2, c2) {
    const t1 = b[r1][c1], t2 = b[r2][c2];
    b[r1][c1] = t2; b[r2][c2] = t1;
    const hit = findMatchesInBoard(b).size > 0;
    b[r1][c1] = t1; b[r2][c2] = t2;
    return hit;
  }

  function hasValidMove(b) {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS && wouldMatch(b, r, c, r, c + 1)) return true;
      if (r + 1 < ROWS && wouldMatch(b, r, c, r + 1, c)) return true;
    }
    return false;
  }

  function makeBoardData() {
    const b = Array.from({ length: ROWS }, (_, r) => Array.from({ length: COLS }, (_, c) => ({ id: 0, suit: randomSuit(), r, c })));
    let guard = 0;
    while (guard++ < 200) {
      const matched = findMatchesInBoard(b);
      if (matched.size === 0) break;
      for (const key of matched) {
        const [r, c] = key.split(",").map(Number);
        b[r][c].suit = randomSuit();
      }
    }
    return b;
  }

  function generateBoard() {
    let b = makeBoardData();
    let guard = 0;
    while (!hasValidMove(b) && guard++ < 20) b = makeBoardData();
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) b[r][c].id = nextId++;
    return b;
  }

  /* ---------- 描画 ---------- */
  function posStyle(tile) {
    tile.el.style.transform = `translate(calc(${tile.c} * (100% + var(--gap))), calc(${tile.r} * (100% + var(--gap)))) translateZ(0)`;
  }

  function createTileEl(tile, startRow, pop) {
    const el = document.createElement("div");
    const def = SUITS[tile.suit];
    el.className = "tile suit-" + tile.suit + (pop ? " pop" : "");
    el.dataset.sym = def.symbol;
    const inner = document.createElement("span");
    inner.className = "sym";
    inner.textContent = def.symbol;
    el.appendChild(inner);
    tile.el = el;
    const savedR = tile.r;
    tile.r = startRow;
    tilesEl.appendChild(el);
    posStyle(tile);
    tile.r = savedR;
    return el;
  }

  function renderBoard() {
    tilesEl.innerHTML = "";
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const tile = board[r][c];
      createTileEl(tile, tile.r, true);
      posStyle(tile);
    }
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      const remaining = [];
      for (let r = 0; r < ROWS; r++) if (board[r][c]) remaining.push(board[r][c]);
      const missing = ROWS - remaining.length;
      const fresh = [];
      for (let i = 0; i < missing; i++) {
        const tile = { id: nextId++, suit: randomSuit(), r: 0, c };
        createTileEl(tile, -(missing - i), false); // ポップさせず上から落ちてくるだけにする
        fresh.push(tile);
      }
      const column = [...fresh, ...remaining];
      for (let r = 0; r < ROWS; r++) {
        const tile = column[r];
        tile.r = r; tile.c = c;
        board[r][c] = tile;
      }
    }
    void tilesEl.offsetWidth;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) posStyle(board[r][c]);
  }

  function swapCells(r1, c1, r2, c2) {
    const t1 = board[r1][c1], t2 = board[r2][c2];
    board[r1][c1] = t2; board[r2][c2] = t1;
    t1.r = r2; t1.c = c2; t2.r = r1; t2.c = c1;
    posStyle(t1); posStyle(t2);
  }

  /* ---------- 目標(ゴール) ---------- */
  function buildGoalsUI() {
    goalsEl.innerHTML = "";
    for (const suit of Object.keys(currentGoals)) {
      const def = SUITS[suit];
      const pill = document.createElement("div");
      pill.className = "goal-pill";
      pill.id = "pill-" + suit;
      pill.innerHTML = `
        <div class="icon" style="color:${def.color}">${def.symbol}</div>
        <div class="info">
          <div class="count"><span id="prog-${suit}">0</span>/${currentGoals[suit]} ${def.label}</div>
          <div class="bar"><div class="bar-fill" id="bar-${suit}" style="background:${def.color}"></div></div>
        </div>`;
      goalsEl.appendChild(pill);
    }
  }

  function updateGoalsUI() {
    for (const suit of Object.keys(currentGoals)) {
      const target = currentGoals[suit], prog = goalProgress[suit];
      $("prog-" + suit).textContent = prog;
      $("bar-" + suit).style.width = Math.min(100, (prog / target) * 100) + "%";
      $("pill-" + suit).classList.toggle("done", prog >= target);
    }
  }

  function isGoalComplete() {
    return Object.keys(currentGoals).every(s => goalProgress[s] >= currentGoals[s]);
  }

  function bumpGoal(suit) {
    if (currentGoals[suit] != null) goalProgress[suit] = Math.min(currentGoals[suit], goalProgress[suit] + 1);
  }

  function updateMovesUI() {
    movesVal.textContent = movesLeft;
    movesBox.classList.toggle("low", movesLeft <= 3);
  }

  function updateStageUI() {
    stageVal.textContent = `${stageIndex + 1} / ${STAGES.length}`;
  }

  let toastTimer;
  function showToast(text) {
    clearTimeout(toastTimer);
    toastEl.textContent = text;
    toastEl.classList.add("show");
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 900);
  }

  /* ---------- カスケード処理 ---------- */
  async function processCascade() {
    let combo = 0;
    while (true) {
      const matched = findMatchesInBoard(board);
      if (matched.size === 0) break;
      combo++;
      const cells = [...matched].map(k => k.split(",").map(Number));
      for (const [r, c] of cells) {
        const tile = board[r][c];
        bumpGoal(tile.suit);
        tile.el.classList.add("clearing");
      }
      updateGoalsUI();
      if (combo >= 2) showToast(`${combo}れんさ!`);
      await wait(230);
      for (const [r, c] of cells) {
        board[r][c].el.remove();
        board[r][c] = null;
      }
      applyGravity();
      await wait(280);
      if (isGoalComplete()) break;
    }
    return combo;
  }

  async function reshuffle() {
    showToast("うごかせないのでシャッフル!");
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) board[r][c].el.classList.add("clearing");
    await wait(230);
    board = generateBoard();
    renderBoard();
    await wait(260);
  }

  async function attemptSwap(r1, c1, r2, c2) {
    if (busy || gameEnded) return;
    if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) return;
    busy = true;
    swapCells(r1, c1, r2, c2);
    await wait(190);
    const matched = findMatchesInBoard(board);
    if (matched.size === 0) {
      swapCells(r1, c1, r2, c2);
      await wait(190);
      busy = false;
      return;
    }
    movesLeft--;
    updateMovesUI();
    await processCascade();
    updateGoalsUI();

    if (isGoalComplete()) {
      await wait(200);
      stageClear();
      busy = false;
      return;
    }
    if (movesLeft <= 0) {
      await wait(200);
      stageFail();
      busy = false;
      return;
    }
    if (!hasValidMove(board)) await reshuffle();
    busy = false;
  }

  /* ---------- ステージ進行 ---------- */
  function loadStage(idx) {
    stageIndex = idx;
    const stage = STAGES[idx];
    movesLeft = stage.moves;
    currentGoals = stage.goals;
    goalProgress = {};
    Object.keys(currentGoals).forEach(s => goalProgress[s] = 0);
    gameEnded = false;
    board = generateBoard();
    renderBoard();
    buildGoalsUI();
    updateGoalsUI();
    updateMovesUI();
    updateStageUI();
    overlay.classList.remove("show");
  }

  function stageClear() {
    gameEnded = true;
    if (stageIndex + 1 > best) {
      best = stageIndex + 1;
      localStorage.setItem("trumpmatch-best-stage", best);
      bestVal.textContent = `記録: ステージ${best}まで到達`;
    }
    const isLast = stageIndex === STAGES.length - 1;
    overlayTitle.textContent = isLast ? "🏆 全ステージクリア!" : `🎉 ステージ${stageIndex + 1} クリア!`;
    overlayTitle.className = "win";
    overlayText.textContent = isLast
      ? `お見事!全${STAGES.length}ステージを制覇しました。のこり${movesLeft}手でクリア。もう一度最初から挑戦できます。`
      : `のこり${movesLeft}手でクリアしました。つぎのステージは目標も手数もかわります。`;
    overlayBtn.textContent = isLast ? "さいしょから" : "つぎのステージへ";
    overlayBtn.onclick = () => loadStage(isLast ? 0 : stageIndex + 1);
    overlay.classList.add("show");
  }

  function stageFail() {
    gameEnded = true;
    overlayTitle.textContent = "ステージ失敗…";
    overlayTitle.className = "lose";
    overlayText.textContent = "手数切れです。目標を達成できませんでした。もういちど同じステージに挑戦しましょう。";
    overlayBtn.textContent = "もういちど";
    overlayBtn.onclick = () => loadStage(stageIndex);
    overlay.classList.add("show");
  }

  /* ---------- 入力(スワイプ/ドラッグ) ---------- */
  let drag = null;

  function cellFromPoint(x, y) {
    const rect = tilesEl.getBoundingClientRect();
    const cw = rect.width / COLS, ch = rect.height / ROWS;
    const c = Math.min(COLS - 1, Math.max(0, Math.floor((x - rect.left) / cw)));
    const r = Math.min(ROWS - 1, Math.max(0, Math.floor((y - rect.top) / ch)));
    return { r, c };
  }

  function setGrabbed(r, c, on) {
    const tile = board[r] && board[r][c];
    if (tile && tile.el) tile.el.classList.toggle("grabbed", on);
  }

  boardEl.addEventListener("pointerdown", e => {
    if (busy || gameEnded) return;
    const { r, c } = cellFromPoint(e.clientX, e.clientY);
    drag = { r, c, x: e.clientX, y: e.clientY, used: false };
    try { boardEl.setPointerCapture(e.pointerId); } catch (err) {}
    setGrabbed(r, c, true);
  });

  boardEl.addEventListener("pointermove", e => {
    if (!drag || drag.used || busy) return;
    const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
    drag.used = true;
    setGrabbed(drag.r, drag.c, false);
    let nr = drag.r, nc = drag.c;
    if (Math.abs(dx) > Math.abs(dy)) nc += dx > 0 ? 1 : -1;
    else nr += dy > 0 ? 1 : -1;
    attemptSwap(drag.r, drag.c, nr, nc);
  });

  function endDrag() {
    if (drag) setGrabbed(drag.r, drag.c, false);
    drag = null;
  }
  boardEl.addEventListener("pointerup", endDrag);
  boardEl.addEventListener("pointercancel", endDrag);
  boardEl.addEventListener("pointerleave", () => { if (drag && !drag.used) endDrag(); });

  /* ---------- 起動 ---------- */
  nextId = 1;
  $("newGame").addEventListener("click", () => loadStage(0));
  loadStage(0);
})();
</script>
</body>
</html>
