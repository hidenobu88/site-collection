<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かわいいクイズランド</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%8D%AC%3C/text%3E%3C/svg%3E">
</head>
<body>
<a href="../../../index.html" data-topbtn style="position:fixed;left:14px;bottom:14px;z-index:99999;display:inline-flex;align-items:center;gap:5px;background:rgba(25,25,25,.82);color:#fff;font-family:system-ui,sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;padding:9px 16px;border-radius:999px;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.35);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);">↑ TOPページへ</a>
<div class="wrap">
    <header class="site-header">
        <div class="deco" aria-hidden="true">
            <span style="left:6%;  animation-duration:15s; animation-delay:0s;">🍬</span>
            <span style="left:16%; animation-duration:20s; animation-delay:4s;  font-size:1.6rem;">⭐</span>
            <span style="left:28%; animation-duration:17s; animation-delay:8s;">🍭</span>
            <span style="left:40%; animation-duration:22s; animation-delay:2s;  font-size:1.4rem;">🎈</span>
            <span style="left:52%; animation-duration:16s; animation-delay:6s;">🍩</span>
            <span style="left:64%; animation-duration:19s; animation-delay:1s;  font-size:1.7rem;">🌈</span>
            <span style="left:74%; animation-duration:21s; animation-delay:9s;">🧁</span>
            <span style="left:84%; animation-duration:14s; animation-delay:3s;  font-size:1.5rem;">⭐</span>
            <span style="left:92%; animation-duration:18s; animation-delay:7s;">🍬</span>
        </div>
        <h1 class="site-title"><a href="index.html">🍬 かわいいクイズランド 🎡</a></h1>
    </header>

    <!-- ヒーロー -->
    <div class="card hero">
        <img class="mascot" src="img/mascot.svg" alt="うさぎのマスコット">
        <p class="hero-lead">ようこそ！ なにしてあそぶ？</p>
        <span class="count-pill">🍬 ディズニークイズが<b>20問</b>あるよ！</span>
    </div>

    <h2 class="section-title">
        あそびをえらんでね
        <small>すきなボタンをタップ！</small>
    </h2>

    <!-- 4つのメニュー -->
    <nav class="menu">
        <a class="menu-card menu-card--quiz" href="game.html">
            <span class="emoji">🎮</span>
            <span class="label">○×クイズ</span>
            <span class="desc">ディズニーの問題に○×で答えよう！</span>
        </a>
        <a class="menu-card menu-card--puzzle" href="puzzle.html">
            <span class="badge-new">NEW!</span>
            <span class="emoji">🧩</span>
            <span class="label">パズル</span>
            <span class="desc">ピースをはめて絵を完成！</span>
        </a>
        <a class="menu-card menu-card--timer" href="timer.html">
            <span class="badge-new">NEW!</span>
            <span class="emoji">⏱️</span>
            <span class="label">ぴったりストップ</span>
            <span class="desc">きめた秒でピタッと止めろ！</span>
        </a>
    </nav>

    <footer class="site-footer">
        <p>© かわいいクイズランド 🍬🎈🌈</p>
    </footer>
</div>
</body>
</html>
