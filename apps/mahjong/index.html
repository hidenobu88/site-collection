<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>麻雀 虎の間 — 本格四人打ち麻雀</title>
  <meta name="description" content="1人用の本格四人打ち麻雀。CPUの強さは弱・中・強の3段階。リーチ・鳴き・ドラ・裏ドラ・役と点数計算を完備。スマホ・タブレット対応。" />
  <meta property="og:title" content="麻雀 虎の間 — 本格四人打ち麻雀" />
  <meta property="og:description" content="CPU3人と対戦できる1人用麻雀。強さ3段階・東風戦/半荘戦に対応。" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='14' y='6' width='72' height='88' rx='12' fill='%23f6f1e3' stroke='%23b7a97f'/><text x='50' y='66' font-size='48' text-anchor='middle' fill='%23c22f2f' font-family='serif'>中</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ヘッダー -->
  <header class="ghead">
    <a class="back" href="../../index.html">↑ TOPページへ</a>
    <h1 class="ghead-title"><span class="t-kanji">麻雀</span><span class="t-sub">虎の間</span></h1>
    <div class="ghead-btns">
      <button class="icon-btn" id="soundBtn" aria-label="サウンド切り替え" title="サウンド ON/OFF">♪</button>
      <button class="icon-btn" id="helpBtn" aria-label="ルール説明" title="ルール説明">？</button>
      <button class="icon-btn" id="restartBtn" aria-label="最初からやり直す" title="新しい対局">⟳</button>
    </div>
  </header>

  <!-- 対局画面 -->
  <main class="stage" id="stage">
    <div class="board" id="board" aria-label="麻雀卓"></div>
    <div class="hintrow" id="hintRow"></div>
    <div class="handbar" id="handBar"></div>
    <div class="actionbar" id="actionBar"></div>
  </main>

  <!-- オーバーレイ（スタート画面・結果・ヘルプなど）は JS が生成 -->
  <div id="overlayRoot"></div>

  <script src="core.js"></script>
  <script src="game.js"></script>
</body>
</html>
