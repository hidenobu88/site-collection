spring.application.name=quiz

# ===== DB接続（環境変数で上書き可） =====
# 例: DB_URL / DB_USER / DB_PASSWORD を設定すればここを変えずに切り替えられます。
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quiz_app}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# スキーマは Flyway が管理するので、Hibernate は検証のみ行う。
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tokyo

# ===== Flyway（マイグレーション） =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Thymeleaf =====
# 開発中はキャッシュを切る（テンプレート変更を即反映）。
spring.thymeleaf.cache=false

# ===== ログ =====
logging.level.org.flywaydb=info
