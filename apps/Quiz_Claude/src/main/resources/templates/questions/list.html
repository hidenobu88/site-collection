<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('問題一覧')}"></head>
<body>
<div class="wrap">
    <header th:replace="~{fragments/layout :: header}"></header>

    <div th:if="${message}" class="flash" th:text="${message}"></div>

    <div class="card">
        <div class="btn-row" style="justify-content: space-between; margin-bottom: 12px;">
            <a class="btn btn--sub btn--small" th:href="@{/}">← トップへ</a>
            <a class="btn btn--small" th:href="@{/questions/new}">＋ 新しい問題</a>
        </div>

        <p class="empty" th:if="${#lists.isEmpty(questions)}">
            まだ問題がありません。<br>「＋ 新しい問題」から登録してね🍬
        </p>

        <div th:each="q : ${questions}" class="q-item">
            <span th:if="${q.answer}" class="badge badge--maru" aria-label="正解はマル">○</span>
            <span th:unless="${q.answer}" class="badge badge--batsu" aria-label="正解はバツ">×</span>

            <div class="q-text">
                <div th:text="${q.text}">問題文</div>
                <div class="q-explanation" th:if="${q.explanation}" th:text="'💡 ' + ${q.explanation}">解説</div>
            </div>

            <div class="q-actions">
                <a class="btn btn--sub btn--small" th:href="@{/questions/{id}/edit(id=${q.id})}">✏️ 編集</a>
                <form th:action="@{/questions/{id}/delete(id=${q.id})}" method="post"
                      onsubmit="return confirm('この問題を削除しますか？');" style="margin:0;">
                    <button type="submit" class="btn btn--danger btn--small">🗑️ 削除</button>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
</body>
</html>
