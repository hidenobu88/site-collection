# ===== プレビュー用プロファイル（h2） =====
# 外部DB・パスワード不要で、組み込みのH2インメモリDBで起動します。
# 使い方: SPRING_PROFILES_ACTIVE=h2 ./mvnw spring-boot:run
# ※ データはメモリ上のみ。アプリを止めると消えます（見た目・動作の確認用）。

spring.datasource.url=jdbc:h2:mem:quizdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 ではスキーマを Hibernate に作らせ、Flyway は無効化する
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# H2 コンソール（http://localhost:8080/h2-console）
spring.h2.console.enabled=true
