<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E">
<style>
.page-hero { text-align:center; padding: 92px 20px 20px; }
.page-hero h1 { font-size: clamp(1.5rem, 4.6vw, 2.2rem); }
.back-row { display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:14px; margin:44px auto 60px; max-width:860px; padding:0 16px; }
.back-row a { display:inline-block; padding:13px 24px; border-radius:999px; background:#fff; color:#ff8fab; border:2px solid #ffc2d4; font-weight:700; text-decoration:none; text-align:center; min-width:220px; transition:transform .15s ease; }
.back-row a:hover { transform:translateY(-2px); }
.back-row a.home { background:#ff8fab; color:#fff; border-color:#ff8fab; box-shadow:0 4px 14px rgba(255,143,171,.4); }
@media (max-width:640px){ .back-row a { width:100%; min-width:0; } }
.detail-block { max-width: 860px; margin: 0 auto 26px; background:#fff; border-radius: 18px; padding: 26px 28px; box-shadow: 0 6px 22px rgba(255,143,171,.14); }
.detail-block h3 { margin-bottom: 10px; }
.detail-block ul { padding-left: 1.3em; line-height: 2; }
.profile-table { width:100%; border-collapse: collapse; font-size:.92rem; }
.profile-table th, .profile-table td { border-bottom:1px solid #ffe3ec; padding: 9px 8px; text-align:left; }
.profile-table th { color:#e0607e; white-space:nowrap; }
@media (max-width: 620px) {
  .profile-table thead { display:none; }
  .profile-table, .profile-table tbody { display:block; }
  .profile-table tr { display:block; background:#fff; border:1px solid #ffe0ea; border-radius:14px; padding:6px 14px; margin-bottom:14px; box-shadow:0 4px 12px rgba(255,143,171,.1); }
  .profile-table td { display:flex; justify-content:space-between; gap:14px; border:none; border-bottom:1px dashed #ffe3ec; padding:9px 0; text-align:right; font-size:.9rem; }
  .profile-table tr td:last-child { border-bottom:none; }
  .profile-table td::before { content:attr(data-label); font-weight:700; color:#e0607e; text-align:left; white-space:nowrap; }
  .profile-table td:first-child { font-weight:800; font-size:1rem; }
}
</style>
</head>
<body>
<header class="site-header">
  <a href="index.html" class="logo">🐾 もふもふパーク</a>
  <nav class="global-nav" id="globalNav">
    <a href="concept.html">コンセプト</a>
    <a href="index.html#price">料金プラン</a>
    <a href="cats.html">ねこスタッフ</a>
    <a href="dogs.html">いぬスタッフ</a>
    <a href="index.html#guide">ご利用案内</a>
  </nav>
  <button class="nav-toggle" id="navToggle" aria-label="メニューを開閉する" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<section class="section page-hero" id="top">
  <h1>🐱 ねこスタッフ詳細</h1>
  <p class="section-lead">12種類・12匹の猫スタッフの詳しいプロフィールをご紹介。<br>カードのボタンで、なかよし度アップもできます。</p>
</section>

<section class="section">
  <div class="animal-grid" id="catGrid"></div>
  <div class="animal-grid" id="dogGrid" style="display:none"></div>
</section>

<section class="section section-alt">
  <h2 class="section-title"><span class="title-icon">📖</span>プロフィールずかん</h2>
  <div class="detail-block">
    <table class="profile-table">
      <thead><tr><th>なまえ</th><th>種類</th><th>原産国</th><th>サイズ</th><th>性格</th><th>好きなあそび</th></tr></thead>
      <tbody id="profileBody"></tbody>
    </table>
  </div>
  <div class="back-row">
    <a href="dogs.html">🐶 いぬスタッフを見る</a>
    <a class="home" href="index.html">🏠 トップページへもどる</a>
    <a href="concept.html">💗 コンセプトを見る</a>
  </div>
</section>
<footer class="site-footer">
  <p class="footer-logo">🐾 もふもふパーク</p>
  <p class="footer-copy">&copy; 2026 Mofumofu Park. このサイトはデモ用の架空店舗サイトです。</p>
</footer>

<script src="script.js"></script>
<script>
(function(){
  var tbody = document.getElementById("profileBody");
  var LABELS = ["なまえ","種類","原産国","サイズ","性格","好きなあそび"];
  CATS.forEach(function(a){
    var tr = document.createElement("tr");
    [a.name, a.breed, a.origin, a.size, a.personality, a.like].forEach(function(v, i){
      var td = document.createElement("td");
      td.textContent = v;
      td.setAttribute("data-label", LABELS[i]);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
})();
</script>
</body>
</html>
