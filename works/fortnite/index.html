<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORANOBU GAME | Fortnite Creative</title>
  <meta name="description" content="UEFN / Verse で開発したフォートナイトのオリジナルマップ。公式クリエイターページからプレイできます。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Zen Kaku Gothic New", sans-serif;
      color: #fff;
      background:
        radial-gradient(ellipse at 20% -10%, rgba(123, 47, 247, 0.55), transparent 55%),
        radial-gradient(ellipse at 85% 110%, rgba(0, 217, 255, 0.35), transparent 55%),
        linear-gradient(160deg, #1a1040 0%, #2b1a6b 45%, #0e2a5c 100%);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 26px 20px 70px;
      position: relative;
    }
    /* ストームっぽい斜めの光 */
    body::before, body::after {
      content: "";
      position: fixed;
      inset: -20%;
      background: linear-gradient(115deg, transparent 42%, rgba(255, 255, 255, 0.05) 46%, transparent 52%);
      pointer-events: none;
    }
    body::after { background: linear-gradient(65deg, transparent 60%, rgba(0, 217, 255, 0.08) 66%, transparent 72%); }

    a { color: inherit; text-decoration: none; }

    .back {
      align-self: flex-start;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 9px 20px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      transform: skewX(-8deg);
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.06);
    }
    .back:hover { background: rgba(255, 255, 255, 0.18); border-color: #fff; }

    .stage { max-width: 760px; width: 100%; min-width: 0; margin: auto; position: relative; z-index: 1; }

    .eyebrow {
      display: inline-block;
      font-family: "Anton", sans-serif;
      font-size: clamp(0.8rem, 2.4vw, 1rem);
      letter-spacing: 0.35em;
      color: #00d9ff;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-shadow: 0 0 18px rgba(0, 217, 255, 0.8);
    }

    h1 {
      font-family: "Anton", sans-serif;
      font-size: clamp(3rem, 12vw, 6.2rem);
      line-height: 0.98;
      text-transform: uppercase;
      transform: skewX(-6deg);
      letter-spacing: 0.01em;
      text-shadow:
        0 4px 0 #6a1fd0,
        0 8px 26px rgba(0, 0, 0, 0.55),
        0 0 60px rgba(123, 47, 247, 0.6);
    }
    h1 .accent {
      display: block;
      background: linear-gradient(180deg, #fff26b, #ffb02e);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 0 #b4551a) drop-shadow(0 0 34px rgba(255, 226, 107, 0.5));
    }

    .lead {
      margin: 30px auto 0;
      max-width: 540px;
      font-size: clamp(0.9rem, 2.6vw, 1.02rem);
      font-weight: 700;
      line-height: 2;
      color: #dfe6ff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 22px; }
    .tag {
      font-family: "Anton", sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      padding: 7px 18px;
      transform: skewX(-8deg);
      border: 2px solid rgba(0, 217, 255, 0.6);
      background: rgba(0, 30, 70, 0.5);
      color: #7fe9ff;
      border-radius: 6px;
    }

    .play {
      display: inline-block;
      margin-top: 42px;
      font-family: "Anton", sans-serif;
      font-size: clamp(1.2rem, 4.4vw, 1.7rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1040;
      background: linear-gradient(180deg, #fff26b, #ffd52e);
      padding: 20px 54px;
      border-radius: 10px;
      transform: skewX(-8deg);
      box-shadow: 0 7px 0 #c98a00, 0 20px 44px rgba(255, 213, 46, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .play span { display: inline-block; transform: skewX(8deg); }
    .play:hover { transform: skewX(-8deg) translateY(-3px) scale(1.03); }
    .play:active { transform: skewX(-8deg) translateY(3px); box-shadow: 0 3px 0 #c98a00; }

    .sub-note { margin-top: 18px; font-size: 0.78rem; font-weight: 700; color: #9fb0e8; }

    .cards {
      display: grid;
      /* min(200px, 100%) にすることで、スマホ幅ではみ出さず1列に折り返す */
      grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr));
      gap: 14px;
      margin-top: 60px;
      width: 100%;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    /* スマホ・小型タブレット向けの調整 */
    @media (max-width: 600px) {
      body { padding: 18px 16px 56px; }
      .play { padding: 17px 34px; width: 100%; max-width: 340px; }
      .lead { line-height: 1.9; }
      .cards { margin-top: 44px; }
    }
    .info-card {
      border: 2px solid rgba(255, 255, 255, 0.16);
      background: rgba(10, 8, 40, 0.55);
      border-radius: 12px;
      padding: 20px 16px;
      transform: skewX(-4deg);
      backdrop-filter: blur(4px);
    }
    .info-card > * { transform: skewX(4deg); }
    .info-card .ico { font-size: 1.7rem; display: block; }
    .info-card h2 {
      font-family: "Anton", sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      color: #ffe66b;
      margin: 8px 0 6px;
      text-transform: uppercase;
    }
    .info-card p { font-size: 0.8rem; font-weight: 700; color: #c9d4f5; line-height: 1.8; }
    .cards { display: flex; justify-content: center; }
    .info-card.solo { max-width: 420px; width: 100%; padding: 30px 26px; }
    .info-card.solo .ico { font-size: 2.3rem; }
    .info-card.solo h2 { font-size: 1.25rem; }
    .info-card.solo p { font-size: 0.9rem; }

    footer { margin-top: 64px; font-size: 0.75rem; font-weight: 700; color: #8792c9; position: relative; z-index: 1; }
  </style>
</head>
<body>
  <a class="back" href="../../index.html">← 戻る</a>

  <div class="stage">
    <p class="eyebrow">⚡ Fortnite Creative Map ⚡</p>
    <h1>Toranobu<span class="accent">Game</span></h1>

    <p class="lead">
      下のボタンから公式クリエイターページに移動して、実際にプレイできます。
    </p>

    <a class="play" href="https://www.fortnite.com/@toranobu_game" target="_blank" rel="noopener noreferrer">
      <span>🎮 マップで あそぶ！</span>
    </a>
    <p class="sub-note">fortnite.com の公式クリエイターページ(@toranobu_game)が開きます</p>

    <div class="cards">
      <div class="info-card solo">
        <span class="ico">🏝️</span>
        <h2>Play Now</h2>
        <p>フォートナイト内でマップコードを入力、またはクリエイターページから直接プレイ</p>
      </div>
    </div>
  </div>

  <footer>© TORANOBU_GAME — Fortnite / UEFN Creative Portfolio</footer>
</body>
</html>
