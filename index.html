<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Collection | 作品集</title>
  <meta name="description" content="制作したWebサイト・アプリをまとめたポートフォリオ。気になる作品をクリックすれば、すぐに実物をご覧いただけます。" />

  <!-- OGP（リンクを送ったときのプレビュー表示用） -->
  <meta property="og:title" content="Site Collection | 作品集" />
  <meta property="og:description" content="制作したWebサイト・アプリを一覧できるポートフォリオサイトです。" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23d43d2a'/></svg>" />

  <!-- フォント：見出し=明朝体 / 本文=ゴシック体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header" id="siteHeader">
    <a class="brand" href="#top">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text" id="brandName">Site Collection</span>
    </a>
    <nav class="header-nav">
      <a href="#works">作品一覧</a>
      <button class="theme-toggle" id="themeToggle" aria-label="テーマ切り替え" title="ライト / ダーク切り替え">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </nav>
  </header>

  <main id="top">

    <!-- ヒーロー -->
    <section class="hero">
      <p class="hero-eyebrow">PORTFOLIO — SITE COLLECTION</p>
      <h1 class="hero-title">
        <span class="hero-line">ひとつのリンクから、</span>
        <span class="hero-line accent-line">すべての作品へ。</span>
      </h1>
      <p class="hero-lead" id="heroLead">
        これまでに制作したWebサイトやアプリをまとめています。<br />
        気になるカードをクリックすると、その場で実物をご覧いただけます。
      </p>
      <div class="hero-meta">
        <div class="hero-stat">
          <span class="hero-stat-num" id="statWorks">0</span>
          <span class="hero-stat-label">作品</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-num" id="statCategories">0</span>
          <span class="hero-stat-label">カテゴリ</span>
        </div>
        <a class="hero-cta" href="#works">
          作品を見る
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </a>
      </div>
      <p class="hero-vertical" aria-hidden="true">作品集 — 記録と実験</p>
    </section>

    <!-- 作品一覧 -->
    <section class="works" id="works">
      <div class="section-head">
        <h2 class="section-title"><span class="section-num">01</span>作品一覧 <span class="section-en">WORKS</span></h2>
        <div class="works-controls">
          <div class="search-box">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input type="search" id="searchInput" placeholder="作品名・技術で検索（ / キーでフォーカス）" aria-label="作品を検索" />
          </div>
          <div class="filter-chips" id="filterChips" role="tablist" aria-label="カテゴリで絞り込み"></div>
        </div>
      </div>

      <div class="works-grid" id="worksGrid"></div>

      <div class="empty-state" id="emptyState" hidden>
        <p class="empty-icon" aria-hidden="true">◌</p>
        <p>該当する作品が見つかりませんでした。<br />検索条件を変えてお試しください。</p>
      </div>

      <nav class="pagination" id="pagination" aria-label="作品一覧のページ切り替え"></nav>
    </section>

  </main>

  <footer class="site-footer">
    <p class="footer-brand" id="footerBrand">Site Collection</p>
    <p class="footer-copy" id="footerCopy"></p>
    <a class="back-to-top" href="#top" aria-label="ページ上部へ戻る">↑ TOP</a>
  </footer>

  <script src="js/projects.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
